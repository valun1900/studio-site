<style>
:root{--bg:#F8F5EF;--bg2:#FFFFFF;--surface:#F2EDE4;--border:#E4DCCF;--text:#1A1714;--text2:#6B6057;--accent:#8B6F47;--accent-light:#EDE5D8;--radius:4px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 32px;max-width:440px;width:100%;}
.icon{width:72px;height:72px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
.icon svg{width:32px;height:32px;color:var(--accent);}
.tag{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,7vw,40px);font-weight:500;line-height:1.2;margin-bottom:12px;}
.sub{font-size:15px;color:var(--text2);line-height:1.65;margin-bottom:32px;font-weight:300;}

.contacts{display:flex;flex-direction:column;gap:10px;margin-bottom:32px;}
.contact-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 20px;border-radius:var(--radius);text-decoration:none;font-size:14px;font-weight:500;transition:opacity 0.2s;}
.contact-btn:hover{opacity:0.85;}
.contact-btn-wa{background:#25D366;color:#fff;}
.contact-btn-tg{background:#229ED9;color:#fff;}
.contact-btn-call{background:var(--text);color:var(--bg);}
.contact-btn svg{width:18px;height:18px;flex-shrink:0;}

.back{font-size:13px;color:var(--text2);}
.back a{color:var(--accent);text-decoration:none;}
.back a:hover{text-decoration:underline;}

.countdown{font-size:13px;color:var(--text2);margin-top:20px;}
.countdown span{color:var(--text);font-weight:500;}

/* Lang */
.lang-bar{position:fixed;top:16px;right:16px;display:flex;gap:4px;}
.lang-btn{background:none;border:1px solid var(--border);cursor:pointer;font-size:12px;letter-spacing:0.06em;color:var(--text2);padding:4px 8px;font-family:inherit;border-radius:2px;}
.lang-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--text);font-weight:500;}
</style>

<script>
const T = {
  ru: {
    tag: 'Студия во Вроцлаве',
    title: 'Заявка принята!',
    sub: 'Мы свяжемся с вами в ближайшее время. Пока можете написать нам напрямую:',
    back: '← <a href="index.html">Вернуться на сайт</a>',
    countdown: 'Автоматический переход через <span id="sec">10</span> сек'
  },
  pl: {
    tag: 'Studio we Wrocławiu',
    title: 'Zgłoszenie przyjęte!',
    sub: 'Skontaktujemy się z Tobą wkrótce. W międzyczasie możesz napisać do nas bezpośrednio:',
    back: '← <a href="index.html">Wróć na stronę</a>',
    countdown: 'Automatyczne przekierowanie za <span id="sec">10</span> sek'
  }
};

let lang = localStorage.getItem('lang') || 'ru';
function setLang(l) {
  lang = l; localStorage.setItem('lang', l);
  document.documentElement.lang = l;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    if (T[l][el.dataset.i18n]) el.innerHTML = T[l][el.dataset.i18n];
  });
  ['ru','pl'].forEach(x => {
    const b = document.getElementById('btn-'+x);
    if (b) b.classList.toggle('active', x === l);
  });
  startCountdown();
}
setLang(lang);

// Countdown + redirect
function startCountdown() {
  let s = 10;
  clearInterval(window._cd);
  window._cd = setInterval(() => {
    s--;
    const el = document.getElementById('sec');
    if (el) el.textContent = s;
    if (s <= 0) { clearInterval(window._cd); window.location.href = 'index.html'; }
  }, 1000);
}
startCountdown();
</script>
